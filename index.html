<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#1a1a1a" />
<title>ルーレット罰ゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&family=Kosugi+Maru&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:"Kosugi Maru",system-ui,sans-serif;color:#fff;background:radial-gradient(800px 500px at 50% 30%,#3a0010,#0a0000);touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
#app{display:flex;flex-direction:column;height:100dvh;padding:14px;gap:10px;max-width:480px;margin:0 auto;align-items:center}
.title{font-family:"Mochiy Pop P One",sans-serif;font-size:24px;color:#ef4444;-webkit-text-stroke:3px #000;paint-order:stroke fill;text-shadow:3px 3px 0 #fff;margin:8px 0}
.gun{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%}
.bullets{display:flex;gap:8px;margin-bottom:10px}
.bullet{width:30px;height:30px;border-radius:50%;border:3px solid #fff;background:#444;display:flex;align-items:center;justify-content:center;font-size:14px}
.bullet.live{background:#ef4444;border-color:#ef4444}
.bullet.fired{background:#222;border-color:#222;opacity:.3}
.gun-pic{font-size:120px;line-height:1;transition:transform .1s}
.gun-pic.shake{animation:shake .1s 5}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
.status{font-family:"Mochiy Pop P One",sans-serif;font-size:18px;text-align:center;min-height:50px;display:flex;align-items:center;justify-content:center}
.status.danger{color:#ef4444;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.status.bang{color:#ffe066;font-size:48px}
.flash{position:fixed;inset:0;background:rgba(255,255,255,0);pointer-events:none;z-index:50;transition:.05s}
.flash.fire{background:rgba(239,68,68,.7)}
.actions{display:flex;gap:8px;width:100%;justify-content:center}
.actions button{background:#ef4444;color:#fff;border:3px solid #fff;padding:14px 26px;font-family:"Mochiy Pop P One",sans-serif;font-size:16px;border-radius:999px;cursor:pointer;box-shadow:3px 3px 0 #fff}
.actions .reset{background:#fff;color:#000;border-color:#000;box-shadow:3px 3px 0 #000}
.actions button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 currentColor}
.actions button:disabled{opacity:.4}
.note{font-size:9px;text-align:center;opacity:.7;line-height:1.5}
.diff-row{display:flex;gap:6px;justify-content:center}
.diff-row button{background:transparent;border:2px solid #fff;color:#fff;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:999px;font-family:inherit}
.diff-row button.on{background:#fff;color:#000}
</style>
</head>
<body>
<div id="app">
<h1 class="title">罰ゲームルーレット 🔫</h1>
<div class="diff-row" id="diffs">
  <button data-d="6" class="on">弾1/6 (易)</button>
  <button data-d="3">弾1/3 (中)</button>
  <button data-d="2">弾1/2 (鬼)</button>
</div>
<div class="gun">
  <div class="bullets" id="bullets"></div>
  <div class="gun-pic" id="gun">🔫</div>
  <div class="status" id="status">引き金を引いて</div>
</div>
<div class="actions">
  <button id="btn-fire">🔫 引き金</button>
  <button id="btn-reset" class="reset">↻ リロード</button>
</div>
<div class="note">※ジョークアプリ。実銃ではありません。<br/>パーティ罰ゲームのお供に</div>
</div>
<div class="flash" id="flash"></div>
<script>
(()=>{
'use strict';
const $=(id)=>document.getElementById(id);
let chambers=6,liveAt=0,fired=0;
function load(){
  liveAt=Math.floor(Math.random()*chambers);fired=0;
  $('status').textContent='引き金を引いて';$('status').className='status';
  renderBullets();
  $('btn-fire').disabled=false;
}
function renderBullets(){
  const e=$('bullets');while(e.firstChild)e.removeChild(e.firstChild);
  for(let i=0;i<chambers;i++){
    const b=document.createElement('div');b.className='bullet';
    if(i<fired){b.classList.add('fired');b.textContent='✓'}
    else b.textContent='?';
    e.appendChild(b);
  }
}
function fire(){
  if(fired>=chambers)return;
  $('gun').classList.remove('shake');void $('gun').offsetWidth;$('gun').classList.add('shake');
  beep(220,.05,'square');
  if(fired===liveAt){
    // BANG
    setTimeout(()=>{
      $('flash').classList.add('fire');setTimeout(()=>$('flash').classList.remove('fire'),100);
      $('status').className='status bang';$('status').textContent='💥 BANG!';
      bangSound();
      $('btn-fire').disabled=true;
      // mark all remaining as fired+ live
      const e=$('bullets');while(e.firstChild)e.removeChild(e.firstChild);
      for(let i=0;i<chambers;i++){
        const b=document.createElement('div');b.className='bullet';
        if(i===liveAt){b.classList.add('live');b.textContent='💥'}
        else if(i<fired){b.classList.add('fired');b.textContent='✓'}
        else b.textContent='?';
        e.appendChild(b);
      }
    },200);
  }else{
    setTimeout(()=>{
      fired++;renderBullets();
      const left=chambers-fired;
      if(left===1){$('status').className='status danger';$('status').textContent='⚠ 残り1発...運命の時'}
      else $('status').textContent=`セーフ！(残り${left})`;
    },150);
  }
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.13)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
function bangSound(){
  const a=en();const o=a.createOscillator(),n=a.createBiquadFilter(),g=a.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(150,a.currentTime);o.frequency.exponentialRampToValueAtTime(40,a.currentTime+.3);
  g.gain.value=.4;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.4);
  o.connect(n).connect(g).connect(a.destination);o.start();o.stop(a.currentTime+.4);
}
$('btn-fire').addEventListener('click',()=>{en();fire()});
$('btn-reset').addEventListener('click',()=>{en();load()});
document.querySelectorAll('#diffs button').forEach(b=>b.addEventListener('click',()=>{
  chambers=parseInt(b.dataset.d);
  document.querySelectorAll('#diffs button').forEach(x=>x.classList.toggle('on',x===b));
  load();
}));
load();
})();
</script>
</body>
</html>
